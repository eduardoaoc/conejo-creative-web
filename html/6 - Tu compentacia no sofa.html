  .cc-sofa::before {
    content: "";
    position: absolute;
    z-index: -1;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(
        180deg,
        #01070e 0%,
        rgba(1, 7, 14, .94) 3%,
        rgba(1, 7, 14, .48) 15%,
        rgba(1, 7, 14, .06) 34%,
        rgba(1, 7, 14, .04) 55%,
        rgba(1, 7, 14, .34) 73%,
        rgba(1, 7, 14, .84) 90%,
        #01070e 100%
      ),
      radial-gradient(
        ellipse at 50% 12%,
        rgba(3, 16, 27, .30) 0%,
        rgba(3, 16, 27, .13) 36%,
        transparent 68%
      );
  }

  .cc-sofa::after {
    content: "";
    position: absolute;
    z-index: -1;
    inset: 0;
    pointer-events: none;
    box-shadow:
      inset 0 90px 100px rgba(1, 7, 14, .52),
      inset 0 -110px 120px rgba(1, 7, 14, .74);
  }

  .cc-sofa__content {
    position: relative;
    width: min(1160px, calc(100% - 48px));
    margin: 0 auto;
    padding: 0 0 clamp(42px, 5vw, 76px);
    text-align: center;
  }

  .cc-sofa__title {
    max-width: 1080px;
    margin: 0 auto;
    color: var(--cc-sofa-white);
    font-size: clamp(36px, 4.2vw, 60px);
    line-height: .98;
    font-weight: 520;
    letter-spacing: -.058em;
    text-wrap: balance;
    text-shadow:
      0 2px 22px rgba(0, 0, 0, .84),
      0 0 44px rgba(0, 0, 0, .58);
  }

  .cc-sofa__title span {
    display: block;
  }

  .cc-sofa__title em {
    display: block;
    margin-top: 7px;
    color: var(--cc-sofa-blue);
    font-family: Georgia, "Times New Roman", serif;
    font-size: 1.02em;
    font-weight: 400;
    letter-spacing: -.05em;
    text-shadow:
      0 2px 24px rgba(0, 0, 0, .92),
      0 0 28px rgba(54, 183, 240, .12);
  }

  .cc-sofa__subtitle {
    max-width: 720px;
    margin: 18px auto 0;
    color: var(--cc-sofa-muted);
    font-size: clamp(14px, 1.05vw, 17px);
    line-height: 1.52;
    letter-spacing: -.018em;
    text-wrap: balance;
    text-shadow:
      0 2px 16px rgba(0, 0, 0, .92),
      0 0 32px rgba(0, 0, 0, .72);
  }

  .cc-sofa__subtitle strong {
    color: rgba(242, 250, 255, .96);
    font-weight: 610;
  }

  .cc-sofa__line {
    width: 74px;
    height: 1px;
    margin: 22px auto 0;
    background: linear-gradient(
      90deg,
      transparent,
      rgba(142, 233, 255, .88),
      transparent
    );
    box-shadow: 0 0 18px rgba(54, 183, 240, .34);
  }

  @media (max-width: 820px) {
    .cc-sofa {
      min-height: 780px;
      background-position: 50% 50%;
    }

    .cc-sofa__content {
      width: min(100% - 32px, 760px);
      padding: 0 0 54px;
    }

    .cc-sofa__title {
      font-size: clamp(34px, 7.6vw, 52px);
    }

    .cc-sofa__subtitle {
      max-width: 580px;
    }
  }

  @media (max-width: 540px) {
    .cc-sofa {
      min-height: 760px;
      background-position: 50% 52%;
    }

    .cc-sofa::before {
      background:
        linear-gradient(
          180deg,
          #01070e 0%,
          rgba(1, 7, 14, .92) 7%,
          rgba(1, 7, 14, .44) 24%,
          rgba(1, 7, 14, .05) 48%,
          rgba(1, 7, 14, .68) 82%,
          #01070e 100%
        ),
        radial-gradient(
          ellipse at 50% 14%,
          rgba(1, 7, 14, .44),
          transparent 64%
        );
    }

    .cc-sofa__content {
      width: min(100% - 24px, 500px);
      padding: 0 0 38px;
    }

    .cc-sofa__title {
      font-size: clamp(31px, 9.2vw, 43px);
      line-height: 1.01;
    }

    .cc-sofa__title em {
      margin-top: 5px;
    }

    .cc-sofa__subtitle {
      margin-top: 18px;
      font-size: 15px;
      line-height: 1.48;
    }
  }

  @media (prefers-reduced-motion: no-preference) {
    .cc-sofa__content {
      animation: cc-sofa-enter .9s cubic-bezier(.2, .75, .2, 1) both;
    }

    @keyframes cc-sofa-enter {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  }
</style>

  class="cc-sofa"
